name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup-old-deployments:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Keep only the latest two successful Pages runs
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'deploy-pages.yml';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              per_page: 100,
            });

            const successfulRuns = runs
              .filter((run) => run.conclusion === 'success' && run.status === 'completed')
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at));

            const runsToDelete = successfulRuns.slice(2);

            core.info(`Found ${successfulRuns.length} successful Pages runs. Keeping 2 and deleting ${runsToDelete.length}.`);

            for (const run of runsToDelete) {
              core.info(`Deleting workflow run ${run.id} created at ${run.created_at}.`);
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });
            }